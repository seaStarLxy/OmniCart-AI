version: '3.8'

services:
  omnicart-backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: omnicart-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    # 通过 env_file 注入密钥，确保安全
    env_file:
      - .env
    volumes:
      # 将宿主机 logs 目录挂载进容器，持久化 Agent 6 的审计日志
      - ./logs:/app/logs
    environment:
      - HOST=0.0.0.0
      - PORT=8000
