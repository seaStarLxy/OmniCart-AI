name: MLSecOps Pipeline

# 触发条件：推送到 main 分支或提交 Pull Request 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # 利用缓存加速依赖安装

    # 3. 安装依赖包和流水线工具
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
        # 临时测试
    - name: temp Run Integration and AI Security Tests
      env: 
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "Starting backend service in the background..."
        # 1. 在后台启动你的服务 (请根据你的实际启动命令修改，比如 uvicorn main:app)
        python main.py & 
        
        # 2. 等待 5-10 秒钟，确保 API 服务完全启动并监听端口
        sleep 10
        
        # 3. 运行集成与安全测试脚本
        echo "Running integration tests..."
        python test_integration.py

    # 4. 代码规范检查 (Lint)
    - name: Lint with Ruff
      run: |
        # 检查所有代码，遇到错误会使流水线失败
        ruff check .

    # 5. 代码安全扫描 (SAST)
    - name: Security Scan with Bandit
      run: |
        # 忽略测试目录，只扫描核心业务代码 (-r 递归扫描)
        bandit -r agents core tools main.py -ll

    # 6. 执行单元测试并生成覆盖率报告
    - name: Run Tests with Pytest
      run: |
        # 运行测试并输出覆盖率统计
        pytest tests/ --cov=./ --cov-report=xml

    # 7. 启动服务并执行多智能体集成测试与安全测试
    - name: Run Integration and AI Security Tests
      env: 
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "Starting backend service in the background..."
        # 1. 在后台启动你的服务 (请根据你的实际启动命令修改，比如 uvicorn main:app)
        python main.py & 
        
        # 2. 等待 5-10 秒钟，确保 API 服务完全启动并监听端口
        sleep 10
        
        # 3. 运行集成与安全测试脚本
        echo "Running integration tests..."
        python test_integration.py

    # 8. 模拟部署 (Simulated Deployment)
    # 通过构建 Docker 镜像来验证系统是否具备可部署性
    - name: Simulate Deployment (Build Docker Image)
      run: |
        echo "Starting simulated deployment..."
        docker build -t omnicart-ai:latest .
        echo "Docker image built successfully! Deployment artifact is ready."
